<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カードイレブン</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1p:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0c1626; --night2:#14233a; --pitch:#1c6b3e; --pitch2:#1f7745;
  --line:rgba(255,255,255,.55); --gold:#e8c25a; --silver:#b9c4d0;
  --red:#e05546; --cyan:#54d6c8; --ink:#eef3f8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'M PLUS 1p',sans-serif;background:var(--night);color:var(--ink);min-height:100vh;
  background-image:radial-gradient(ellipse at 50% -20%, #1d3b2c 0%, var(--night) 60%);}
.wrap{max-width:520px;margin:0 auto;padding:12px 12px 90px}
h1{font-family:'DotGothic16',monospace;font-size:26px;letter-spacing:2px;text-align:center;padding:10px 0 2px;
  color:var(--gold);text-shadow:0 0 12px rgba(232,194,90,.45)}
.sub{font-size:11px;text-align:center;color:#8fa3b8;margin-bottom:10px;letter-spacing:1px}
.no-title h1,.no-title .sub{display:none}
.coins{position:fixed;top:10px;right:12px;background:var(--night2);border:1px solid var(--gold);
  border-radius:20px;padding:4px 12px;font-weight:900;font-size:14px;color:var(--gold);z-index:50}

/* tabs */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--night2);
  border-top:1px solid #2a3d56;z-index:50}
.tabs button{flex:1;background:none;border:none;color:#7e93a9;padding:12px 0 14px;font-size:12px;
  font-weight:700;font-family:inherit;cursor:pointer}
.tabs button.on{color:var(--gold)}
.tabs .ico{display:block;font-size:18px;margin-bottom:2px}
.screen{display:none}.screen.on{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

/* buttons */
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-family:inherit;
  font-weight:900;font-size:15px;cursor:pointer;margin:8px 0;color:#11202f;
  background:linear-gradient(180deg,#f3d57c,var(--gold));box-shadow:0 3px 0 #9c7e2c}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #9c7e2c}
.btn.ghost{background:var(--night2);color:var(--ink);box-shadow:0 3px 0 #0a121f;border:1px solid #2a3d56}
.btn:disabled{filter:grayscale(.8);opacity:.5}
.row{display:flex;gap:8px}.row .btn{flex:1}

/* cards */
.card{width:116px;height:190px;border-radius:9px;position:relative;overflow:hidden;flex-shrink:0;
  background:linear-gradient(165deg,#23344c,#101c2e);border:2px solid #3a4f6c;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;padding:6px 4px;user-select:none}
/* N: シンプルな鉄枠 */
.card.n{border-color:#46586e;background:linear-gradient(165deg,#243549,#121e30)}
.card.n .rar{color:#8fa3b8}
/* R: シルバーメタリック+流れる光沢 */
.card.r{border-color:#c8d4e0;background:linear-gradient(165deg,#3e5066,#192535 55%,#2c3c52);
  box-shadow:0 0 8px rgba(180,200,225,.3),inset 0 0 0 1px rgba(220,235,250,.25),inset 0 0 12px rgba(190,210,235,.12)}
.card.r .rar{color:#e6eef7;text-shadow:0 0 5px rgba(200,225,250,.9)}
.card.r::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(120deg,transparent 30%,rgba(225,240,255,.2) 46%,rgba(225,240,255,.05) 52%,transparent 68%);
  background-size:250% 250%;animation:sheenR 5.5s ease-in-out infinite alternate}
@keyframes sheenR{from{background-position:0% 0%}to{background-position:100% 100%}}
/* SR: ゴールド二重枠+虹ホロ背景+キラ流光+粒子 */
.card.sr{border-color:#f0cd6a;background:linear-gradient(165deg,#54451d,#221a08);
  box-shadow:0 0 14px rgba(232,194,90,.5),inset 0 0 0 2px rgba(255,236,185,.4),inset 0 0 14px rgba(255,220,140,.22)}
.card.sr .rar{color:#ffe18a;text-shadow:0 0 7px rgba(255,210,110,1)}
.card.sr .pnm{color:#ffeebe}
.card.sr::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(130deg,rgba(255,90,130,.17),rgba(255,212,95,.17),rgba(115,255,175,.17),rgba(95,185,255,.17),rgba(205,115,255,.17));
  background-size:320% 320%;animation:holobg 5s ease-in-out infinite alternate}
@keyframes holobg{from{background-position:0% 0%}to{background-position:100% 100%}}
.card.sr::after{content:"";position:absolute;inset:-60%;pointer-events:none;
  background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.5) 44%,rgba(120,255,210,.38) 50%,rgba(255,160,220,.38) 56%,transparent 70%);
  animation:holo 2.6s linear infinite}
@keyframes holo{from{transform:translateX(-40%) rotate(8deg)}to{transform:translateX(40%) rotate(8deg)}}
.card .spark{position:absolute;color:#fff3c4;text-shadow:0 0 7px #ffd96a;pointer-events:none;
  font-size:11px;z-index:3;animation:tw 1.9s infinite}
.card .spark.s2{animation-delay:.9s;font-size:9px}
@keyframes tw{0%,100%{opacity:0;transform:scale(.4) rotate(0deg)}50%{opacity:1;transform:scale(1.15) rotate(25deg)}}
.card .chead{display:flex;align-items:center;width:100%;padding:2px 3px 0;min-width:0;z-index:3;position:relative}
.card .pos{flex:0 0 auto;font-size:10px;font-weight:900;padding:1px 5px;border-radius:4px;color:#0c1626}
.pos.GK{background:#f0c34e}.pos.DF{background:#6fc2f0}.pos.MF{background:#7fdb8e}.pos.FW{background:#f08080}
.card .rar{font-family:'DotGothic16';font-size:11px;color:var(--gold)}
/* ===== レーダー(背景)+ 中央スプライト ===== */
.card .radar{position:relative;width:100%;height:96px;margin-top:1px}
.card .radarsvg{position:absolute;inset:0;width:100%;height:100%}
.card .radar .rgrid polygon{fill:none;stroke:rgba(255,255,255,.14);stroke-width:.8}
.card .radar .rspoke line{stroke:rgba(255,255,255,.11);stroke-width:.6}
.card .radar .rfill{fill:rgba(95,200,216,.26);stroke:#5fc8d8;stroke-width:1.5;stroke-linejoin:round;filter:drop-shadow(0 0 3px rgba(95,200,216,.55))}
.card.sr .radar .rfill{fill:rgba(240,205,106,.24);stroke:#f0cd6a;filter:drop-shadow(0 0 3px rgba(240,205,106,.6))}
.card.l .radar .rfill{fill:rgba(255,150,180,.22);stroke:#ff9bb4;filter:drop-shadow(0 0 4px rgba(255,150,180,.6))}
.card .face{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))}
canvas.sprite{image-rendering:auto}
.card .rlab{position:absolute;z-index:3;font-family:'DotGothic16';font-size:8px;font-weight:700;color:#9fb2c6;line-height:1;white-space:nowrap;display:flex;align-items:center;gap:2px;text-shadow:0 1px 2px #000}
.card .rlab b{font-size:10px;font-weight:900;color:#fff}
.card .rlab b.mx{color:#ffd24a;text-shadow:0 0 6px rgba(255,210,74,.85)}
.card .rl-of{top:-2px;left:50%;transform:translateX(-50%)}
.card .rl-df{top:24%;right:0}
.card .rl-po{bottom:24%;right:0}
.card .rl-te{bottom:-2px;left:50%;transform:translateX(-50%)}
.card .rl-sp{bottom:24%;left:0}
.card .rl-st{top:24%;left:0}
/* ===== 下部インフォ ===== */
.card .cinfo{display:flex;flex-direction:column;align-items:center;gap:1px;width:100%;padding:1px 5px 0;margin-top:auto;z-index:3;position:relative}
.card .pnm{max-width:100%;font-size:11px;font-weight:900;color:#eef4fb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.card .ovr{display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DotGothic16';font-size:8px;color:#8fa3b8;letter-spacing:1px}
.card .ovr b{font-size:13px;color:var(--gold);line-height:1;text-shadow:0 0 6px rgba(232,194,90,.5)}
.card .tp{font-size:8px;color:#8fd8c4;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.card .sk{font-size:8px;font-weight:900;margin-top:1px;padding:1px 6px;border-radius:6px;background:#2a3d56;color:#cfdcea;max-width:98%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.card.r .sk{background:#43586e;color:#e8eef5}
.card.sr .sk{background:linear-gradient(90deg,#7a5f17,#b08c2e);color:#fff7dd}
.card.mini{width:96px;height:166px}
.card.mini .radar{height:80px}
.card.mini .rlab{display:none}
.card.mini .pos{font-size:8px;padding:1px 4px}
.card.mini .pnm{font-size:9px}.card.mini .rar{font-size:9px}
.card.mini .ovr{font-size:7px;gap:3px}.card.mini .ovr b{font-size:11px}
.card.mini .tp{font-size:7px}.card.mini .sk{font-size:7px}
.card.sel{outline:3px solid var(--cyan)}

.grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.collfilter{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 2px}
.natchip{font-family:'M PLUS 1p',sans-serif;font-size:11px;font-weight:700;padding:3px 9px;border-radius:14px;
  border:1px solid #2a3d56;background:#0f1c2f;color:#b9c8da;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.natchip:active{transform:scale(.96)}
.natchip.on{background:var(--cyan);color:#06222a;border-color:transparent}
.natchip span{font-size:9px;background:rgba(0,0,0,.2);padding:0 5px;border-radius:8px;font-weight:900}
.natchip.on span{background:rgba(0,0,0,.16)}

/* pitch */
.pitch{position:relative;width:100%;aspect-ratio:3/4;border-radius:12px;overflow:hidden;margin:10px 0;
  background:repeating-linear-gradient(0deg,var(--pitch) 0 12.5%,var(--pitch2) 12.5% 25%);
  border:2px solid #0e3d23;box-shadow:inset 0 0 40px rgba(0,0,0,.35)}
.pitch::before{content:"";position:absolute;inset:4%;border:2px solid var(--line);border-radius:4px}
.pitch::after{content:"";position:absolute;left:4%;right:4%;top:50%;border-top:2px solid var(--line)}
.pitch .circle{position:absolute;left:50%;top:50%;width:24%;aspect-ratio:1;border:2px solid var(--line);
  border-radius:50%;transform:translate(-50%,-50%)}
.slot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:2}
.slot .slothead{font-size:9px;font-weight:900;letter-spacing:.5px;color:#0c1626;border-radius:5px;padding:0 6px;line-height:1.55;min-width:38px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.35)}
.slot.empty .slothead{opacity:.85}
.slot .slothead.fit-ok{box-shadow:0 0 0 2px #4caf6e,0 1px 2px rgba(0,0,0,.35)}
.slot .slothead.fit-mild{box-shadow:0 0 0 2px var(--gold),0 1px 2px rgba(0,0,0,.35)}
.slot .slothead.fit-bad{box-shadow:0 0 0 2px var(--red),0 1px 2px rgba(0,0,0,.35)}
.slot .slothead .fitmark{margin-left:3px;font-size:8px}
.slot .ph{width:40px;height:40px;border:2px dashed rgba(255,255,255,.45);border-radius:50%;
  background:rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(255,255,255,.45)}
.slot .slotsprite{width:50px;height:44px;display:flex;align-items:center;justify-content:center;position:relative;margin-top:2px}
.slot .slotring{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:30px;height:7px;border-radius:50%}
.slot .slotring.n{background:rgba(255,255,255,.18)}
.slot .slotring.r{background:rgba(201,212,224,.6);box-shadow:0 0 6px rgba(201,212,224,.55)}
.slot .slotring.sr{background:rgba(232,194,90,.75);box-shadow:0 0 8px rgba(232,194,90,.75)}
.slot .slotring.l{background:rgba(255,255,255,.85);box-shadow:0 0 10px rgba(255,255,255,.85)}
.slot .slotinfo{display:flex;align-items:center;gap:4px;font-size:8px;font-weight:900;color:#cfdcea;
  background:rgba(10,19,34,.6);border-radius:6px;padding:2px 5px;max-width:80px;white-space:nowrap}
.slot .slotinfo .flag{font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif;
  font-size:14px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.6))}
.slot .slotinfo .nm{overflow:hidden;text-overflow:ellipsis;max-width:32px}
.slot .slotinfo .ovr{margin-left:auto;color:var(--gold);font-size:10px}
.slot .slotinfo .ovr b{color:var(--gold);font-size:11px}
.slot .keytag{font-size:7px;font-weight:900;color:#1a1206;background:var(--gold);
  padding:1px 5px;line-height:1.3;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.35)}
.slot.keypos .slotsprite canvas{filter:drop-shadow(0 0 5px rgba(232,194,90,.8))}
.slot .slothead.GK{background:#f0c34e}
.slot .slothead.DF{background:#6fc2f0}
.slot .slothead.MF{background:#7fdb8e}
.slot .slothead.FW{background:#f08080}
/* ポジション帯ゾーン(FW/MF/DF/GK で視覚分割) */
.pitch .zones{position:absolute;inset:0;z-index:0;pointer-events:none}
.pitch .zone{position:absolute;left:0;right:0}
.pitch .zone>span{position:absolute;top:2px;left:0;font-size:8px;font-weight:900;letter-spacing:1px;
  color:rgba(255,255,255,.6);background:rgba(8,16,28,.5);padding:1px 5px;border-radius:0 6px 6px 0}
.pitch .zone.fw{top:0;height:33%;background:linear-gradient(rgba(240,128,128,.16),rgba(240,128,128,.04))}
.pitch .zone.mf{top:33%;height:36%;background:linear-gradient(rgba(127,219,142,.14),rgba(127,219,142,.04));border-top:1px dashed rgba(255,255,255,.28)}
.pitch .zone.df{top:69%;height:17%;background:linear-gradient(rgba(111,194,240,.15),rgba(111,194,240,.04));border-top:1px dashed rgba(255,255,255,.28)}
.pitch .zone.gk{top:86%;height:14%;background:linear-gradient(rgba(240,195,78,.16),rgba(240,195,78,.05));border-top:1px dashed rgba(255,255,255,.28)}

/* picker modal */
.modal{position:fixed;inset:0;background:rgba(5,10,18,.85);z-index:100;display:none;
  align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.sheet{background:var(--night2);width:100%;max-width:520px;max-height:50vh;overflow-y:auto;position:relative;
  border-radius:16px 16px 0 0;padding:14px}
.sheet h3{font-size:14px;margin-bottom:6px}
.sheet .close-btn{position:absolute;top:10px;right:10px;width:34px;height:34px;border:none;background:#2a3d56;border-radius:50%;\n  color:#cfdcea;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}\n.sheet .close-btn:active{background:#3d5070}

/* match */
.score{display:flex;align-items:center;justify-content:space-between;background:var(--night2);
  border-radius:12px;padding:10px 14px;margin:8px 0;border:1px solid #2a3d56}
.score .t{font-size:12px;font-weight:900;width:34%}.score .t.away{text-align:right;color:#ffb3a8}
.score .s{font-family:'DotGothic16';font-size:30px;color:var(--gold)}
.clock{text-align:center;font-family:'DotGothic16';font-size:15px;color:var(--cyan);margin:4px 0}
.ballbar{position:relative;height:14px;background:linear-gradient(90deg,#2a5d8f,#234,#8f3a2a);
  border-radius:7px;margin:8px 0;overflow:hidden;border:1px solid #2a3d56}
.ballbar .b{position:absolute;top:1px;width:12px;height:12px;background:#fff;border-radius:50%;
  transition:left .5s;box-shadow:0 0 8px #fff}
.feed{background:#0a1422;border:1px solid #223650;border-radius:10px;height:130px;overflow-y:auto;
  padding:8px 10px;font-size:12px;line-height:1.8}
.feed .goal{color:var(--gold);font-weight:900}
.feed .chance{color:var(--cyan)}
.tactics{display:flex;gap:6px;margin:8px 0}
.tactics button{flex:1;padding:10px 4px;border-radius:8px;border:1px solid #2a3d56;background:var(--night2);
  color:var(--ink);font-family:inherit;font-weight:900;font-size:12px;cursor:pointer}
.tactics button.on{background:var(--gold);color:#11202f;border-color:var(--gold)}
.banner{font-family:'DotGothic16';text-align:center;font-size:22px;color:var(--gold);margin:10px 0;
  text-shadow:0 0 14px rgba(232,194,90,.5)}

/* 俯瞰フィールド */
.fieldview{position:relative;width:50%;aspect-ratio:3/4;border-radius:10px;overflow:hidden;margin:8px auto;
  background:repeating-linear-gradient(0deg,var(--pitch) 0 8.33%,var(--pitch2) 8.33% 16.66%);
  border:2px solid #0e3d23;box-shadow:inset 0 0 30px rgba(0,0,0,.35)}
.fieldview::before{content:"";position:absolute;inset:3% 5%;border:1px solid var(--line)}
.fieldview::after{content:"";position:absolute;left:5%;right:5%;top:50%;border-top:1px solid var(--line)}
.fieldview .fc{position:absolute;left:50%;top:50%;width:0;height:0;
  border-radius:50%;transform:translate(-50%,-50%)}
.fieldview .fc::before{content:"";position:absolute;left:50%;top:50%;width:78px;height:78px;max-width:24vw;max-height:24vw;
  border:1px solid var(--line);border-radius:50%;transform:translate(-50%,-50%)}
/* 上下ゴール(短辺) */
.fieldview .goalL,.fieldview .goalR{position:absolute;left:34%;right:34%;height:3%;border:1px solid var(--line)}
.fieldview .goalL{top:3%;border-top:none}    /* 上=敵陣ゴール */
.fieldview .goalR{bottom:3%;border-bottom:none}  /* 下=自陣ゴール */
.tok{position:absolute;transform:translate(-50%,-58%);z-index:2}
.tok canvas{transition:transform .2s}
.tok.hot{z-index:6;filter:drop-shadow(0 0 7px #ffe9a8)}
.tok.hot canvas{transform:scale(1.4)}
.tok .ring{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);
  width:18px;height:7px;border-radius:50%}
.tok .ring.H{background:rgba(33,150,243,.8);box-shadow:0 0 6px rgba(33,150,243,.7)}
.tok .ring.A{background:rgba(229,57,53,.8);box-shadow:0 0 6px rgba(229,57,53,.7)}
.fball{position:absolute;width:10px;height:10px;border-radius:50%;background:#fff;
  box-shadow:0 0 8px #fff,0 2px 2px rgba(0,0,0,.5);transform:translate(-50%,-50%);z-index:4}

/* カットイン演出 */
.cutin{position:fixed;inset:0;z-index:130;pointer-events:none;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden}
.cutin .band{position:absolute;left:-6%;right:-6%;top:50%;height:172px;transform:translateY(-50%) skewY(-3deg);
  background:linear-gradient(90deg,rgba(8,14,24,0),rgba(8,14,24,.95) 12%,rgba(8,14,24,.95) 88%,rgba(8,14,24,0));
  border-top:2px solid var(--gold);border-bottom:2px solid var(--gold)}
.cutin .inner{position:relative;display:flex;align-items:center;gap:20px;z-index:1}
.cutin .cutlabel{position:relative;z-index:1;font-family:'DotGothic16';font-size:14px;color:var(--cyan);margin-top:10px}
.fighter{display:flex;flex-direction:column;align-items:center;gap:3px}
.fighter .fn{font-weight:900;font-size:13px;text-shadow:0 1px 3px #000}
.fighter .fst{font-family:'DotGothic16';font-size:11px;color:var(--gold)}
.fromL{animation:inL .28s both}.fromR{animation:inR .28s both}
@keyframes inL{from{transform:translateX(-90px);opacity:0}to{transform:none;opacity:1}}
@keyframes inR{from{transform:translateX(90px);opacity:0}to{transform:none;opacity:1}}
.vsmark{font-family:'DotGothic16';font-size:36px;color:var(--red);text-shadow:0 0 10px rgba(224,85,70,.7);animation:vspop .35s both}
@keyframes vspop{0%{transform:scale(3);opacity:0}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
.cutword{font-family:'DotGothic16';font-size:40px;color:#fff;z-index:1;
  text-shadow:0 0 16px rgba(84,214,200,.8);animation:vspop .3s both}
.cutword.gold{font-size:50px;color:var(--gold);text-shadow:0 0 24px rgba(232,194,90,.95)}
.goalrays{position:fixed;inset:-60%;z-index:125;pointer-events:none;
  background:repeating-conic-gradient(rgba(232,194,90,.22) 0 8deg,transparent 8deg 16deg);
  animation:rayspin 1.4s linear both}
@keyframes rayspin{from{transform:rotate(0);opacity:0}15%{opacity:1}to{transform:rotate(36deg);opacity:0}}
.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:none}20%{transform:translate(4px,-3px)}40%{transform:translate(-4px,3px)}
  60%{transform:translate(3px,2px)}80%{transform:translate(-3px,-2px)}}
@media (prefers-reduced-motion: reduce){.fromL,.fromR,.vsmark,.cutword,.goalrays,.shake{animation:none}}

/* gacha */
.packlist{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.packtile{position:relative;border-radius:14px;padding:14px 10px 12px;cursor:pointer;text-align:center;overflow:hidden;
  background:linear-gradient(165deg,#1c2740,#0c1420);border:2px solid var(--pc);

<div id="bootStat" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#7a1740;color:#fff;font:11px/1.6 monospace;padding:4px 8px">BOOT 1/3: HTML読込OK / メインJSの解析待ち…</div>
<script>
(function(){
  var st=document.getElementById("bootStat");
  window.__boot=function(msg,ok){
    st.style.display="block";
    st.textContent="BOOT: "+msg;
    st.style.background=ok?"#0e5c30":"#7a1740";
    if(ok)setTimeout(function(){st.style.display="none";},3000);
  };
  window.addEventListener("error",function(ev){
    st.style.display="block";st.style.background="#7a1740";
    st.textContent="⚠ JSエラー: "+(ev.message||"?")+" (行"+(ev.lineno||"?")+":"+(ev.colno||"?")+")";
  },true);
  window.addEventListener("unhandledrejection",function(ev){
    st.style.display="block";st.style.background="#7a1740";
    st.textContent="⚠ 非同期エラー: "+((ev.reason&&ev.reason.message)||ev.reason||"?");
  });
})();
</script>

function imgReady(img){ // Android Chromeのdecode()ハング対策
  return new Promise(res=>{
    if(img.complete&&img.naturalWidth>0)return res();
    img.onload=()=>res();img.onerror=()=>res();
    setTimeout(res,4000);
  });
}
// 固有選手のモチーフ画像。build.py が src/assets/signatures/<id>.png を base64 化して
// window.SIG_IMG={id:dataURI,...} を注入する(テスト時は未定義=プレースホルダ描画)。
const SIG_IMG_EL={};
if(typeof window!=="undefined"&&window.SIG_IMG){for(const k in window.SIG_IMG){const im=new Image();im.src=window.SIG_IMG[k];SIG_IMG_EL[k]=im;}}
const SPR_READY=Promise.all([imgReady(HEAD_IMG),imgReady(BODY_IMG),...Object.values(SIG_IMG_EL).map(imgReady)]);
const withTimeout=(p,ms)=>Promise.race([p,new Promise(r=>setTimeout(r,ms))]);
const BODY_ANCHOR=[[71, 22], [68, 21], [69, 27], [55, 31], [58, 22], [67, 24], [66, 30], [65, 24], [63, 15], [64, 20], [69, 18], [64, 17], [60, 24], [81, 25], [67, 25], [65, 17]]; // 各ボディの首位置(肌色検出で算出)
const HCW=100,HCH=96,BCW=132,BCH=88,POSCOL={FW:0,MF:1,DF:2,GK:3};

const SKIN_C=["#f5cfa0","#e3b07a","#c98850","#8d5a33"];
const HAIR_C=["#1a1a1a","#5a3517","#d9a440","#b03020","#274f9e","#cfd6dd"];
const KIT_C=[["#d32f2f","#ffffff"],["#1565c0","#ffffff"],["#2e7d32","#ffe14d"],["#6a1fa2","#ffd54f"],["#212121","#e53935"],["#fafafa","#1565c0"],["#00838f","#ffb300"]];
const GK_C=[["#fdd835","#212121"],["#ff8f00","#1a237e"],["#9ccc26","#212121"]];
const SHOE_C=["#212121","#fafafa","#d32f2f","#e8c25a"]; // 金シューズはSR専用
const POSES_BY={FW:["shoot","dribble"],MF:["pass","point"],DF:["mark","tackle"],GK:["dive","catch"]};
function makeLook(pos,rar){
  return {skin:ri(0,3),hair:ri(0,5),hc:ri(0,5),
    kit:pos==="GK"?ri(0,GK_C.length-1):ri(0,KIT_C.length-1),
    shoe:rar==="sr"?3:ri(0,2),pose:rnd(POSES_BY[pos]),
    jaw:ri(0,2),brow:ri(0,2),nose:ri(0,2),mouth:ri(0,3),beard:ri(0,3),
    headIdx:ri(0,31),bodyVar:ri(0,3)};
}
function spriteCanvas(c,hgt){ // 頭部+ボディのアトラス合成
  const W=132,H=150;
  const cv=document.createElement("canvas");cv.width=W;cv.height=H;
  cv.className="sprite";cv.style.height=hgt+"px";cv.style.width=(hgt*W/H)+"px";
  const ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=true;
  if(c.sig){ // 固有選手: 頭部+ボディ合成ではなくモチーフ画像1枚を描画
    const im=SIG_IMG_EL[c.sig];
    if(im&&im.naturalWidth>0){
      const sc=Math.min(W/im.naturalWidth,H/im.naturalHeight);
      const dw=im.naturalWidth*sc,dh=im.naturalHeight*sc;
      ctx.drawImage(im,(W-dw)/2,H-dh,dw,dh); // 下端そろえで中央配置
      return cv;
    }
    // 画像未配置/未ロード: ★エンブレムのプレースホルダ
    ctx.fillStyle="#13203a";ctx.fillRect(20,18,W-40,H-36);
    ctx.fillStyle="#e8c25a";ctx.font="bold 54px serif";ctx.textAlign="center";ctx.fillText("★",W/2,H/2+4);
    ctx.fillStyle="#cfdcea";ctx.font="bold 16px sans-serif";ctx.fillText((c.name||"").slice(0,4),W/2,H-30);
    return cv;
  }
  const L=c.look||(c.look=makeLook(c.pos,c.rar));
  if(L.headIdx==null){L.headIdx=ri(0,31);L.bodyVar=ri(0,3);}
  const bi=L.bodyVar*4+POSCOL[c.pos];
  const by=H-BCH;
  try{
    if(BODY_IMG.naturalWidth===0||HEAD_IMG.naturalWidth===0)throw 0;
    ctx.drawImage(BODY_IMG,(bi%4)*BCW,(bi>>2)*BCH,BCW,BCH,0,by,BCW,BCH);
    const a=BODY_ANCHOR[bi];
    const HH=80,HW=Math.round(HH*HCW/HCH);
    ctx.drawImage(HEAD_IMG,(L.headIdx%8)*HCW,(L.headIdx>>3)*HCH,HCW,HCH,a[0]-(HW>>1),by+a[1]-HH+20,HW,HH);
  }catch(e){ // 画像が使えない端末でも簡易シルエットで続行
    const kit=(c.pos==="GK"?GK_C:KIT_C)[Math.min(L.kit,(c.pos==="GK"?GK_C:KIT_C).length-1)][0];
    ctx.fillStyle=SKIN_C[L.skin];ctx.fillRect(46,18,40,40);          // 頭
    ctx.fillStyle=HAIR_C[L.hc];ctx.fillRect(44,12,44,14);            // 髪
    ctx.fillStyle="#141a24";ctx.fillRect(56,36,6,8);ctx.fillRect(72,36,6,8); // 目

  }

// 各 sub は1つの大分類(coarse: GK/DF/MF/FW)に属する【不変条件: subGroup(c.sub)===c.pos】
const SUBGROUP={CF:"FW",ST:"FW",LWG:"FW",RWG:"FW",
  OMF:"MF",CMF:"MF",DMF:"MF",LMF:"MF",RMF:"MF",
  LSB:"DF",CB:"DF",RSB:"DF",GK:"GK"};
const SUBS_BY={FW:["CF","ST","LWG","RWG"],MF:["OMF","CMF","DMF","LMF","RMF"],DF:["LSB","CB","RSB"],GK:["GK"]};
// 大分類内の近接クラスタ(同クラスタ内=近接 / 別クラスタ=非近接)
const SUBNEAR={FW:[["CF","ST"],["LWG","RWG"]],
  MF:[["OMF","CMF","DMF"],["LMF","RMF"]],
  DF:[["LSB","RSB"],["CB"]],GK:[["GK"]]};
const SUBLABEL={CF:"CF",ST:"ST",LWG:"LWG",RWG:"RWG",OMF:"OMF",CMF:"CMF",DMF:"DMF",LMF:"LMF",RMF:"RMF",LSB:"LSB",CB:"CB",RSB:"RSB",GK:"GK"};
// 2段階適正 pen: ①大分類 一致/不一致 → ②同分類内の細分 完全一致/近接/非近接
const POSFIT={exact:1.0,near:0.92,far:0.85,group:0.72};
function subGroup(sub){return SUBGROUP[sub]||"MF";}
function subClusterMates(group,sub){const c=(SUBNEAR[group]||[]).find(a=>a.indexOf(sub)>=0);return c||[sub];}
function posFit(cardSub,slotSub){
  const cg=subGroup(cardSub),sg=subGroup(slotSub);
  if(cg!==sg)return POSFIT.group;                                   // ① 大分類が違う(例:MF→FW枠)
  if(cardSub===slotSub)return POSFIT.exact;                         // 細分まで完全一致
  return subClusterMates(sg,slotSub).indexOf(cardSub)>=0?POSFIT.near:POSFIT.far; // ② 同分類内の近接/非近接
}

// フォーメーション相性: 守備側の陣形に対し、攻撃側スタイルの有利(best)/不利(worst)を定義。
// 攻撃側の主要判定(tfA経由)に best=+15% / worst=−12% を乗算。両チームの攻撃に対称適用。
// ※best/worstは試合エンジンの実測(各陣形相手のスタイル別得点。同強度クローン2880試合で計測)に
//   一致させてある。係数は「自然な傾向の増幅」であり、ヒント表示と実挙動が食い違わないようにする。
//   4-4-2/4-3-3/3-5-2=サイドが通る一方ロング/ショートが詰まる / 5-3-2=5バック低ブロックはショート連携で崩れ
//   ロングは跳ね返す / 4-3-1-2=ナロー菱形は背後とワイドが空きロングが刺さる / 4-2-3-1=ダブルボランチ裏で中央突破が伸びる
const FORM_COUNTER={
  "4-4-2":{best:"side",worst:"short"},
  "4-3-3":{best:"side",worst:"long"},
  "3-5-2":{best:"side",worst:"short"},
  "5-3-2":{best:"short",worst:"long"},
  "4-3-1-2":{best:"long",worst:"short"},
  "4-2-3-1":{best:"center",worst:"short"}
};
const COUNTER_BONUS=1.15, COUNTER_PENALTY=0.88;
// 攻撃スタイル style が、守備側フォーメーション form に対して持つ相性係数
function counterFactor(style,form){
  const c=FORM_COUNTER[form];
  if(!c)return 1;                       // form未設定(クローン対戦など)は等倍=バランス不変
  if(c.best===style)return COUNTER_BONUS;
  if(c.worst===style)return COUNTER_PENALTY;
  return 1;
}
// [クラブ名, 強さLv, 得意フォーメーション]。相手はこの陣形で実際に布陣する。
// 各スタイル(side/short/long/center)が有効になるクラブが2つずつ&Lv1〜4で全4種を学べる配置にしている。
const CLUBS=[["FCバンビーノ",1,"4-4-2"],["コバルト水戸海",2,"5-3-2"],["レッドファング",3,"4-3-1-2"],["AC月光",4,"4-2-3-1"],["ヴェルデ皇国",5,"4-3-3"],["ガラクシア11",6,"5-3-2"],["鋼鉄オルカ",7,"4-3-1-2"],["王立クロノス",8,"4-2-3-1"]];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const cl=v=>Math.min(20,Math.max(1,v));
const RAR_TOTAL={l:98,sr:88,r:68,n:53}; // 6ステータス合計の目標(丸め上振れ込みで実測≒100/90/70/55)
// 目標合計付近になるよう6値を生成(分散を持たせてから正規化し1-20にクランプ)
function genStats(rar){
  const total=RAR_TOTAL[rar]||55;
  let v=[0,0,0,0,0,0].map(()=>1+Math.random());  // 1.0〜2.0の素の重み
  let sum=v.reduce((a,b)=>a+b,0);
  v=v.map(x=>x/sum*total);                         // 合計=totalにスケール
  // 1〜20にクランプしつつ、はみ出し分を他へ再配分
  for(let iter=0;iter<6;iter++){
    v=v.map(x=>Math.min(20,Math.max(1,x)));
    const diff=total-v.reduce((a,b)=>a+b,0);
    if(Math.abs(diff)<0.5)break;
    const room=v.map(x=>diff>0?20-x:x-1);
    const rt=room.reduce((a,b)=>a+b,0)||1;
    v=v.map((x,i)=>x+diff*room[i]/rt);
  }
  return v.map(x=>Math.round(Math.min(20,Math.max(1,x))));
}
function scaleTo(c,target){ // 既存6ステの合計をtargetへ比例スケール(1-20クランプ)
  const ks=["off","def","pow","tec","spd","sta"];
  let cur=ks.reduce((s,k)=>s+c[k],0);
  if(cur<=0)return;
  let f=target/cur;
  ks.forEach(k=>c[k]=Math.round(Math.min(20,Math.max(1,c[k]*f))));
}

function rollSkill(pos,rar){
  if(rar==="n")return null;
  if(rar==="l"){const [name,desc,fx]=rnd(LSKILLS[pos]);return {name,desc,fx};}
  const [name,desc,fx]=rnd(SKILLS[pos][rar]);
  return {name,desc,fx};
}
function makeCard(forcePos,forceRar,forceBase,forceSub){
  // forcePos は大分類(GK/DF/MF/FW)。細分pos(CF/LSB等)が来たら大分類へ正規化し、細分として採用。
  if(forcePos&&SUBS_BY[forcePos]==null&&SUBGROUP[forcePos]){forceSub=forceSub||forcePos;forcePos=SUBGROUP[forcePos];}
  const pos=forcePos||rnd(["GK","DF","DF","MF","MF","MF","FW","FW"]);
  const sub=(forceSub&&SUBGROUP[forceSub]===pos)?forceSub:rnd(SUBS_BY[pos]);
  let rar=forceRar;
  if(!rar){const x=Math.random()*100;rar=x<5?"sr":x<30?"r":"n";}
  const sv=genStats(rar);
  const c={id:uid++,name:rnd(NAMES),flag:rnd(FLAGS),look:makeLook(pos,rar),pos,sub,rar,type:rollType(pos),
    off:sv[0],def:sv[1],pow:sv[2],tec:sv[3],spd:sv[4],sta:sv[5],skill:rollSkill(pos,rar)};
  if(pos==="GK"){c.def=cl(c.def+3);c.off=cl(c.off-3);}
  if(pos==="DF"){c.def=cl(c.def+2);c.pow=cl(c.pow+1);c.off=cl(c.off-2);}
  if(pos==="MF"){c.tec=cl(c.tec+2);c.sta=cl(c.sta+1);}
  if(pos==="FW"){c.off=cl(c.off+2);c.spd=cl(c.spd+1);c.def=cl(c.def-2);}
  return c;
}

function migrate(){ // 旧カード → 6パラメータ+スキル+ドット絵パーツ
  S.coll=S.coll.map(o=>{
    let c=o;
    if(c.off==null){
      const sv=genStats(c.rar);
      c={...c,off:c.atk!=null?c.atk:sv[0],def:c.def!=null?c.def:sv[1],pow:sv[2],tec:sv[3],spd:sv[4],sta:sv[5],skill:rollSkill(c.pos,c.rar)};
    }
    if(!c.look)c.look=makeLook(c.pos,c.rar);
    if(!c.look.pose)c.look.pose=rnd(POSES_BY[c.pos]);
    if(c.look.jaw==null){c.look.jaw=ri(0,2);c.look.brow=ri(0,2);c.look.nose=ri(0,2);c.look.mouth=ri(0,3);c.look.beard=ri(0,3);}
    if(c.look.headIdx==null){c.look.headIdx=ri(0,31);c.look.bodyVar=ri(0,3);}
    if(!c.type)c.type=rollType(c.pos);
    if(!c.sub)c.sub=rnd(SUBS_BY[c.pos]||["CMF"]); // v9: 細分ポジション付与
    return c;
  });
  // v8: 1-9 → 1-20 リスケール(レア度別の目標合計へ)
  if(S.v<8){
    S.coll.forEach(c=>{
      if(c.off!=null && (c.off+c.def+c.pow+c.tec+c.spd+c.sta)<=54){ // 旧スケール(合計54以下)のみ
        scaleTo(c,RAR_TOTAL[c.rar]||55);
      }
    });
  }
  S.v=9;
}
async function load(){
  await withTimeout(SPR_READY,4500);

      const r=await withTimeout(window.storage.get("ci-save"),3000);
      if(r&&r.value){S=JSON.parse(r.value);uid=S.nextId||1000;
        if(S.v!==9){migrate();await save();}

        return;}

  }catch(e){/* 初回は未保存 */}
  FORMS["4-4-2"].forEach((sl,i)=>{
    const sub=sl[0],c=makeCard(subGroup(sub),i===9?"r":"n",null,sub);
    S.coll.push(c);S.squad[i]=c.id;});
  S.coll.push(makeCard("MF","r"),makeCard("FW","n"),makeCard("DF","n"));
  grantSignatureTest();
  await save();
}

// 6ステの六角レーダー(背景)。頂点順: OF(上)→DF→PO→TE→SP→ST(時計回り)
function radarSVG(c){
  const order=["off","def","pow","tec","spd","sta"],R=42,C=50;
  const ang=i=>(-90+i*60)*Math.PI/180;
  const P=(i,r)=>[(C+Math.cos(ang(i))*r).toFixed(1),(C+Math.sin(ang(i))*r).toFixed(1)];
  const ring=f=>order.map((_,i)=>P(i,R*f).join(",")).join(" ");
  const spokes=order.map((_,i)=>{const[x,y]=P(i,R);return `<line x1="${C}" y1="${C}" x2="${x}" y2="${y}"/>`;}).join("");
  const vpoly=order.map((k,i)=>P(i,R*Math.max(.08,c[k]/20)).join(",")).join(" ");
  return `<svg class="radarsvg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">`
    +`<g class="rgrid"><polygon points="${ring(1)}"/><polygon points="${ring(.66)}"/><polygon points="${ring(.33)}"/></g>`
    +`<g class="rspoke">${spokes}</g><polygon class="rfill" points="${vpoly}"/></svg>`;
}

  const lab=(cls,k)=>`<div class="rlab ${cls}">${STAT_SHORT[k]}<b${c[k]>=20?' class="mx"':''}>${c[k]}</b></div>`;
  d.innerHTML=`<div class="chead"><span class="pos ${c.pos}">${c.sub}</span></div>
  <div class="radar">${radarSVG(c)}${lab("rl-of","off")}${lab("rl-df","def")}${lab("rl-po","pow")}${lab("rl-te","tec")}${lab("rl-sp","spd")}${lab("rl-st","sta")}<div class="face"></div></div>
  <div class="cinfo"><div class="pnm">${c.flag} ${c.name}</div><div class="ovr">OVR<b>${ovr}</b><span class="rar">${c.sig?"★★★★":RARS[c.rar]}</span></div><div class="tp">${typeOf(c).n}</div>${sk}</div>`;
  d.querySelector(".face").appendChild(spriteCanvas(c,mini?40:50));

let pickSlot=null;
function total(c){return c.off+c.def+c.pow+c.tec+c.spd+c.sta;}
// 枠に置いた時の実効OVR(ポジション適性pen・キーポジション係数を反映した「計算後」の値)
function slotEffOVR(c,sub,i){
  const pen=posFit(c.sub,sub);
  const keyStat=(KEYPOS[S.form]||{})[i];
  const ks=["off","def","pow","tec","spd","sta"];
  let sum=0;
  ks.forEach(k=>{let v=c[k]*pen;if(keyStat===k)v*=KEY_MUL;sum+=v;});
  return Math.round(sum);
}

let _revealing=false;
function drawPack(id){ // 純ロジック(演出なし):引けたらカード配列、不可なら null。テスト/将来の自動化から再利用可。
  const p=packById(id);if(!p||!p.can())return null;

async function openPackById(id){
  if(_revealing)return;
  const p=packById(id);if(!p)return;
  if(!p.can()){toast(p.cost!=null?"コインが足りません!リーグ戦で稼ごう":"このパックは未所持(試合後にドロップ)");return;}
  _revealing=true;

function runReveal(p,cards){
  return new Promise(resolve=>{
    const ord={l:0,sr:1,r:2,n:3};
    const best=cards.reduce((a,c)=>ord[c.rar]<ord[a.rar]?c:a,cards[0]);
    const ov=document.getElementById("packOverlay"),stage=document.getElementById("packStage");
    ov.className="packov show";
    stage.innerHTML=`<div class="bigpack floatup" id="bigpack" style="--pc:${p.color}"><div class="bp-shine"></div><div class="bp-emoji">${p.emoji}</div><div class="bp-name">${p.name}</div></div>`
      +`<div class="taphint" id="tapHint">タップで開封!</div><div class="burstcards" id="burstCards"></div><div class="revresult" id="revResult"></div>`;
    const bigpack=document.getElementById("bigpack");
    let opened=false;
    const finish=again=>{ov.className="packov";stage.innerHTML="";resolve(again);};
    const doOpen=async()=>{
      if(opened)return;opened=true;
      const hint=document.getElementById("tapHint");if(hint)hint.style.display="none";
      bigpack.classList.add("burst");
      const fl=document.createElement("div");fl.className="packflash";stage.appendChild(fl);
      await sleep(380);bigpack.style.display="none";fl.remove();
      const bc=document.getElementById("burstCards");
      cards.forEach((c,i)=>{const el=cardEl(c);el.classList.add("flyin");el.style.animationDelay=(i*0.14)+"s";bc.appendChild(el);});
      await sleep(360+cards.length*140);
      const rr=document.getElementById("revResult");
      if(best.rar==="l"){rr.className="revresult leg";rr.innerHTML="🌈 LEGEND 出現!! 伝説の選手だ!!";}
      else if(best.rar==="sr"){rr.className="revresult sr";rr.innerHTML="✨ ★★★ SR ゲット!";}
      else{rr.className="revresult";rr.innerHTML="";}
      const canAgain=p.can();
      const row=document.createElement("div");row.className="row";
      if(canAgain){
        const ab=document.createElement("button");ab.className="btn";ab.textContent="もう1回引く";
        ab.onclick=()=>finish(true);row.appendChild(ab);
      }
      const cb=document.createElement("button");cb.className=canAgain?"btn ghost":"btn";cb.textContent="とじる";
      cb.onclick=()=>finish(false);row.appendChild(cb);
      rr.appendChild(row);
    };
    bigpack.addEventListener("click",doOpen);
    document.getElementById("tapHint").addEventListener("click",doOpen);
    setTimeout(()=>{if(!opened)doOpen();},1700); // 一定時間で自動開封
  });
}

// ================= リーグ戦モード =================
const LG_CLUBS=["マイチーム",...CLUBS.map(c=>c[0])]; // 自分+8クラブ=9チーム
function lgLevel(name){const c=CLUBS.find(x=>x[0]===name);return c?c[1]:0;}
// ラウンドロビン(円卓法)で全8節の対戦表を生成
function makeFixtures(){
  const real=LG_CLUBS.length;          // 9チーム(奇数)
  const BYE=-1;
  let idx=[...Array(real).keys(),BYE];  // ダミーを足して偶数化(10)
  const n=idx.length, rounds=[];
  for(let r=0;r<n-1;r++){               // n-1=9節
    const games=[];
    for(let i=0;i<n/2;i++){
      const a=idx[i],b=idx[n-1-i];
      if(a!==BYE&&b!==BYE)games.push([a,b]); // ダミー戦=休み
    }
    rounds.push(games);
    idx=[idx[0],idx[n-1],...idx.slice(1,n-1)]; // 0番固定で時計回り回転
  }
  return rounds; // 9節・各チーム8試合
}
function blankTable(){
  const t={};LG_CLUBS.forEach((nm,i)=>t[i]={p:0,w:0,d:0,l:0,gf:0,ga:0,pt:0});return t;
}
// CPU同士の試合結果を高速算出(戦力Lvベースのポアソン風)
function simCpu(aLv,bLv){
  const exp=l=>0.6+l*0.18;
  const pois=m=>{let L=Math.exp(-m),k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}
  let ga=pois(exp(aLv)*(1+(aLv-bLv)*0.08));
  let gb=pois(exp(bLv)*(1+(bLv-aLv)*0.08));
  return [Math.max(0,ga),Math.max(0,gb)];
}
function applyResult(T,hi,ai,hs,as){
  T[hi].p++;T[ai].p++;T[hi].gf+=hs;T[hi].ga+=as;T[ai].gf+=as;T[ai].ga+=hs;
  if(hs>as){T[hi].w++;T[hi].pt+=3;T[ai].l++;}
  else if(hs<as){T[ai].w++;T[ai].pt+=3;T[hi].l++;}
  else{T[hi].d++;T[ai].d++;T[hi].pt++;T[ai].pt++;}
}
function rankList(T){
  return Object.keys(T).map(i=>({i:+i,...T[i]}))
    .sort((a,b)=>b.pt-a.pt||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.i-b.i);
}

  S.league={fixtures:makeFixtures(),round:0,table:blankTable()};

function playLeagueRound(){
  const lg=S.league;
  const games=lg.fixtures[lg.round];
  const myGame=games.find(g=>g[0]===0||g[1]===0);
  if(myGame){
    // 他カードを先にCPU処理し、自分の試合は実プレイ
    lg._pending=games.filter(g=>g!==myGame);
    const oppName=LG_CLUBS[myGame[0]===0?myGame[1]:myGame[0]];
    const idx=CLUBS.findIndex(c=>c[0]===oppName);
    lg._myHome=(myGame[0]===0);
    startLeagueMatch(idx,oppName);
  }else{
    games.forEach(([hi,ai])=>{const[hs,as]=simCpu(lgLevel(LG_CLUBS[hi]),lgLevel(LG_CLUBS[ai]));applyResult(lg.table,hi,ai,hs,as);});
    lg.round++;save();renderLeagueMode();
  }
}
function finishLeagueRound(myHS,myAS){
  const lg=S.league;
  const games=lg.fixtures[lg.round];
  const myGame=games.find(g=>g[0]===0||g[1]===0);
  if(lg._myHome)applyResult(lg.table,myGame[0],myGame[1],myHS,myAS);
  else applyResult(lg.table,myGame[0],myGame[1],myAS,myHS); // 自分がawayなら入替
  (lg._pending||[]).forEach(([hi,ai])=>{const[hs,as]=simCpu(lgLevel(LG_CLUBS[hi]),lgLevel(LG_CLUBS[ai]));applyResult(lg.table,hi,ai,hs,as);});
  lg._pending=null;lg.round++;save();
}

// ================= 試合エンジン =================
// マッチアップの基本は据え置き(バランス検証済みの数値):
//  支配=中盤の技/速/持、中央=得意勝負、サイド=速技→クロス→力、ロング=技→速の駆けっこ、ショート=技の連携
const TH={duel:1.1,gk:0.88,side:0.9,cross:0.78,longPass:0.95,longRace:1.08,chain:0.92,shortBonus:1.12};
const STYLE_LABEL={center:"🎯中央突破",side:"🏃サイドアタック",long:"🚀ロングパス",short:"🔄ショートパス"};
const HOME_KIT=["#1565c0","#ffffff"],AWAY_KIT=["#d32f2f","#ffffff"];
let MC=null; // 進行中の試合コンテキスト
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function fatigue(c,played){
  if(c.skill&&c.skill.fx.iron)return 1;
  return 1-(Math.min(Math.max(played,0),90)/90)*0.35*(1-(c.sta-1)/19);
}
function recalcAuras(t){
  t.teamChance=1;t.teamDef=1;
  t.players.forEach(p=>{
    const f=p.c.skill?p.c.skill.fx:{};
    if(f.teamChance)t.teamChance*=f.teamChance;
    if(f.teamDef)t.teamDef*=f.teamDef;
  });
  // 同国籍ケミストリー: 最多同国籍人数に応じてチーム全体を微強化(両チーム共通・対称)
  const cnt={};let mx=0,nat=null;
  t.players.forEach(p=>{const f=p.c.flag||"?";cnt[f]=(cnt[f]||0)+1;if(cnt[f]>mx){mx=cnt[f];nat=f;}});
  t.chemN=mx;t.chemNat=nat;
  t.chem=1+Math.min(0.06,Math.max(0,mx-2)*0.012); // 3人で+1.2% … 7人以上で+6%(上限)
}
function buildTeam(cards,side,form){
  const t={players:cards,tactic:"bal",style:"center",score:0,side,form};
  cards.forEach(p=>{p.fside=side;p.stat={shots:0,goals:0,assists:0,duelW:0,duelL:0,tkl:0,saves:0};});
  recalcAuras(t);
  return t;
}
function statRating(p){
  const s=p.stat||{};
  const r=6.0+(s.goals||0)*1.1+(s.assists||0)*0.55+(s.duelW||0)*0.13-(s.duelL||0)*0.07
    +(s.tkl||0)*0.12+(s.saves||0)*0.22-((s.shots||0)-(s.goals||0))*0.05;
  return Math.max(3,Math.min(10,Math.round(r*10)/10));
}
function myTeam(){
  const cards=[];
  const kp=KEYPOS[S.form]||{};
  FORMS[S.form].forEach((sl,i)=>{
    const c=S.coll.find(k=>k.id===S.squad[i]);
    if(c)cards.push({c,role:subGroup(sl[0]),subRole:sl[0],pen:posFit(c.sub,sl[0]),x:sl[1],y:sl[2],enter:0,
      keyStat:kp[i]||null,keyMul:kp[i]?KEY_MUL:1});
  });
  return buildTeam(cards,"H",S.form);
}
function oppTeam(lv,form){
  form=form||"4-4-2"; // 省略時は従来通り4-4-2(テスト互換)
  const avg=6.6+lv*1.0; // 1選手あたり平均ステ(クラブLv1≈7.6 → Lv8≈14.6)
  const kp=KEYPOS[form]||{};
  const cards=FORMS[form].map((sl,i)=>{
    const a=avg+ri(-1,1);
    const rar=a>=13?"sr":a>=10?"r":"n";
    const c=makeCard(subGroup(sl[0]),rar,null,sl[0]);
    scaleTo(c,a*6); // チームLvに応じて合計を微調整
    return {c,role:subGroup(sl[0]),subRole:sl[0],pen:1,x:sl[1],y:sl[2],enter:0,
      keyStat:kp[i]||null,keyMul:kp[i]?KEY_MUL:1};
  });
  if(lv>=8){ // 最終ボスのエースはレジェンド(陣形のFW枠からランダムに1名)
    const fwIdx=FORMS[form].map((sl,i)=>subGroup(sl[0])==="FW"?i:-1).filter(i=>i>=0);
    const i=fwIdx.length?rnd(fwIdx):FORMS[form].length-1;
    const sb=cards[i].subRole;
    cards[i]={c:makeCard(subGroup(sb),"l",null,sb),role:subGroup(sb),subRole:sb,pen:1,x:cards[i].x,y:cards[i].y,enter:0,
      keyStat:kp[i]||null,keyMul:kp[i]?KEY_MUL:1};
  }
  return buildTeam(cards,"A",form);
}
function oppPickStyle(t){
  const wide=t.players.filter(p=>p.role!=="GK"&&(p.x<=30||p.x>=70));
  const fws=t.players.filter(p=>p.role==="FW"),mfs=t.players.filter(p=>p.role==="MF");
  const avg=(l,k)=>l.length?l.reduce((s,p)=>s+p.c[k],0)/l.length:0;
  const sc={center:avg(fws,"off")+avg(fws,"pow")*0.5,
    side:avg(wide,"spd")+avg(wide,"tec"),
    long:avg(fws,"spd")*1.4+avg(t.players.filter(p=>p.role!=="FW"),"tec")*0.4,
    short:avg(mfs,"tec")*1.6};
  let best="center",bv=-1;
  for(const k in sc){const v=sc[k]*(0.85+Math.random()*0.3);if(v>bv){bv=v;best=k;}}
  return best;
}
function situ(p,T,opT,min){
  const f=p.c.skill?p.c.skill.fx:{};
  let m=1;
  if(f.clutch&&min>=70)m*=f.clutch;
  if(f.losing&&T.score<opT.score)m*=f.losing;
  return m;
}
function eff(p,k,min,T,opT){
  const km=p.keyStat===k?(p.keyMul||1):1;
  return p.c[k]*p.pen*fatigue(p.c,min-p.enter)*situ(p,T,opT,min)*(T&&T.chem||1)*km;
}
function fx(p){return p.c.skill?p.c.skill.fx:{};}
function midPower(T,opT,min){
  let m=0;
  T.players.forEach(p=>{
    const w=(p.role==="MF"?1:0.32)*(fx(p).mid||1)*typeOf(p.c).poss;
    m+=(eff(p,"tec",min,T,opT)*0.45+eff(p,"spd",min,T,opT)*0.3+eff(p,"sta",min,T,opT)*0.25)*w;
  });
  const tf=T.tactic==="atk"?1.05:T.tactic==="def"?0.92:1;
  const sf=T.style==="short"?1.06:T.style==="long"?0.94:1;
  return m*tf*sf;
}
function pickW(list,wfn){
  if(!list.length)return null;
  const tot=list.reduce((s,x)=>s+wfn(x),0);let r=Math.random()*tot;
  for(const x of list){r-=wfn(x);if(r<=0)return x;}
  return list[list.length-1];
}
const isWide=p=>p.role!=="GK"&&(p.x<=30||p.x>=70);
function pickAttacker(T){return pickW(T.players.filter(p=>p.role!=="GK"),p=>(p.role==="FW"?3:p.role==="MF"?1.5:0.3)*(typeOf(p.c).atk||1));}
function pickDefender(T){return pickW(T.players.filter(p=>p.role!=="GK"),p=>(p.role==="DF"?3:p.role==="MF"?1:0.2)*(typeOf(p.c).defSel||1));}
function pickWide(T){const ws=T.players.filter(p=>isWide(p)||(p.role!=="GK"&&typeOf(p.c).wideSel));return ws.length?pickW(ws,p=>(p.c.spd+p.c.tec)*(typeOf(p.c).wideSel?1.25:1)):pickAttacker(T);}
function pickWideDef(T){const ws=T.players.filter(p=>p.role==="DF"&&(p.x<=35||p.x>=65));return ws.length?rnd(ws):pickDefender(T);}
function pickTarget(T){return pickW(T.players.filter(p=>p.role==="FW"||p.role==="MF"),p=>(p.role==="FW"?3:0.4)*(typeOf(p.c).tgt||1));}
function pickPasser(T){return pickW(T.players.filter(p=>p.role!=="FW"),p=>(p.role==="MF"?2:1)*p.c.tec*(typeOf(p.c).pas||1));}
function pickPress(T){return pickW(T.players.filter(p=>p.role==="MF"||p.role==="DF"),p=>p.c.spd+p.c.def);}
function pickGK(T){return T.players.find(p=>p.role==="GK")||T.players[0];}
const rr=()=>0.6+Math.random()*0.8;

function feed(msg,cls){
  const f=document.getElementById("feed");
  const d=document.createElement("div");if(cls)d.className=cls;d.innerHTML=msg;
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function skillFeed(p){if(p.c.skill)feed(`✨ スキル発動!【${p.c.skill.name}】${p.c.name}`,"chance");}

async function maybeVs(a,A,d,D,label){
  if(["sr","l"].includes(a.c.rar)||["sr","l"].includes(d.c.rar)||Math.random()<0.18)await vsCutin(a,A,d,D,label);
}
async function tryShot(atk,A,D,min,header,fx0,fy0,assist){
  atk.stat.shots++;
  const gk=pickGK(D);
  const fxA=fx(atk),fxG=fx(gk);
  const dir=dirOf(A),gx=goalXOf(A);
  const sx=fx0!=null?fx0:curP(atk).x, sy=fy0!=null?fy0:curP(atk).y;
  const gy=42+ri(0,16);
  movePlayer(atk,sx,sy,0.3);
  movePlayer(gk,gx-dir*2,gy,0.3);     // GKがコースに立つ
  hot(atk);hot(gk);
  await wordCutin(atk,A,header?"ヘディング!!":"シュート!!",false,750);
  const sBase=header
    ?eff(atk,"off",min,A,D)*0.45+eff(atk,"pow",min,A,D)*0.55
    :eff(atk,"off",min,A,D)*0.7+eff(atk,"pow",min,A,D)*0.3;
  const sSc=sBase*(fxA.shoot||1)*rr();
  const gSc=eff(gk,"def",min,D,A)*(fxG.save||1)*D.teamDef*rr();
  if(sSc>gSc*TH.gk){
    if(fxG.miracle&&!gk.um){ // レジェンドGK【奇跡の手】:1試合1回の失点無効化
      gk.um=true;
      gk.stat.saves++;
      await ballTo(gx-dir*1,gy,0.22,"linear");
      feed(`✨【奇跡の手】発動!!${gk.c.name}がありえない反応で掻き出した!!`,"goal");
      await wordCutin(gk,D,"MIRACLE!!",true,1200);
      await ballTo(gx-dir*16,gy+ri(-12,12),0.5);
      return;
    }
    await ballTo(gx+dir*1.5,gy,0.22,"linear");   // ネットに突き刺さる
    A.score++;
    atk.stat.goals++;
    if(assist)assist.stat.assists++;
    document.getElementById(A.side==="H"?"sH":"sA").textContent=A.score;
    feed(`⚽ ゴーーール!!<b>${atk.c.name}</b>が${header?"ヘディングで":""}決めた!(${header?"力"+atk.c.pow:"攻"+atk.c.off})`,"goal");
    if(fxA.shoot)skillFeed(atk);
    await wordCutin(atk,A,"GOAL!!!",true,1450);
    await kickoffReset();                          // 全員定位置→キックオフ
  }else{
    gk.stat.saves++;
    await ballTo(gx-dir*1,gy,0.22,"linear");
    movePlayer(gk,gx-dir*1,gy,0.18);               // GKが触る
    feed(`GK ${gk.c.name}(守${gk.c.def})がストップ!`);
    if(fxG.save)skillFeed(gk);
    await wordCutin(gk,D,"SAVE!!",false,720);
    await ballTo(gx-dir*14,gy+ri(-12,12),0.5);     // 弾き出し
  }
}
async function attackEvent(A,D,min){
  // tfAに「攻撃スタイル × 相手フォーメーション」の相性係数を畳み込む(全スタイルの主判定に一律適用)
  const tfA=(A.tactic==="atk"?1.15:A.tactic==="def"?0.85:1)*counterFactor(A.style,D.form);
  const tfD=D.tactic==="def"?1.15:D.tactic==="atk"?0.85:1;
  const who=A.side==="A"?"🔴 ":"";
  const st=A.style;
  const dir=dirOf(A),gx=goalXOf(A);

  if(st==="side"){ // ウイングがタッチライン際を駆け上がる
    const w=pickWide(A), d=pickWideDef(D);
    const wy=curP(w).y<50?12:88;
    movePlayer(w,50+dir*16,wy,0.5);
    movePlayer(d,50+dir*24,wy+(wy<50?5:-5),0.5);
    await ballTo(50+dir*14,wy,0.5);                 // サイドへ展開
    hot(w);hot(d);
    await maybeVs(w,A,d,D,"🏃 サイドの仕掛け(速×技)");
    const aSc=(eff(w,"spd",min,A,D)*0.6+eff(w,"tec",min,A,D)*0.4)*(fx(w).duelSpd||1)*A.teamChance*tfA*rr();
    const dSc=(eff(d,"def",min,D,A)*0.55+eff(d,"spd",min,D,A)*0.45)*(fx(d).duelD||1)*D.teamDef*tfD*rr();
    if(aSc>dSc*TH.side){
      w.stat.duelW++;
      movePlayer(w,gx-dir*10,wy,0.45);
      await ballTo(gx-dir*11,wy,0.45);              // 縦に突破
      feed(`${who}🏃 サイド突破!<b>${w.c.name}</b>(速${w.c.spd}・技${w.c.tec})が${d.c.name}を振り切った!`,"chance");
      if(fx(w).duelSpd)skillFeed(w);
      const t=pickTarget(A), m=pickDefender(D);
      const cx2=gx-dir*7, cy2=42+ri(0,16);
      movePlayer(t,cx2-dir*2,cy2,0.4);
      movePlayer(m,cx2+dir*2,cy2+ri(-4,4),0.4);
      hot(t);hot(m);
      await ballTo(cx2,cy2,0.4);                    // クロスが中央へ
      const crossM=0.72+eff(w,"tec",min,A,D)/20*0.5;
      const tSc=(eff(t,"pow",min,A,D)*0.55+eff(t,"off",min,A,D)*0.25+eff(t,"spd",min,A,D)*0.2)*(fx(t).duelPow||1)*crossM*rr();
      const mSc=(eff(m,"pow",min,D,A)*0.5+eff(m,"def",min,D,A)*0.5)*(fx(m).duelD||1)*tfD*rr();
      if(tSc>mSc*TH.cross){
        t.stat.duelW++;
        feed(`クロス!中央で<b>${t.c.name}</b>(力${t.c.pow})が${m.c.name}(力${m.c.pow})に競り勝った!`,"chance");
        if(fx(t).duelPow)skillFeed(t);
        await tryShot(t,A,D,min,true,cx2,cy2,w);
      }else{
        t.stat.duelL++;m.stat.duelW++;
        feed(`クロスは${m.c.name}(力${m.c.pow})が跳ね返した!`);if(fx(m).duelD)skillFeed(m);
        await ballTo(50+dir*6,cy2+ri(-18,18),0.55); // クリア
      }
    }else{
      w.stat.duelL++;d.stat.duelW++;
      feed(`${who}🏃 ${w.c.name}のサイド突破 → ${d.c.name}(守${d.c.def}・速${d.c.spd})が対応!`);if(fx(d).duelD)skillFeed(d);
      await ballTo(50,wy+(wy<50?14:-14),0.5);
    }
  }

  else if(st==="long"){ // 後方からのロブが前線へ
    const p=pickPasser(A), r=pickTarget(A), cut=pickPress(D);
    await ballTo(curP(p).x,curP(p).y,0.35);          // 後方の起点へ
    const pSc=eff(p,"tec",min,A,D)*tfA*rr();
    const cSc=(eff(cut,"spd",min,D,A)*0.5+eff(cut,"def",min,D,A)*0.5)*tfD*rr();
    hot(p);
    if(pSc>cSc*TH.longPass){
      feed(`${who}🚀 <b>${p.c.name}</b>(技${p.c.tec})が最前線へロングフィード!`,"chance");
      const d=pickDefender(D);
      const lx=gx-dir*18, ly=20+ri(0,60);
      movePlayer(r,lx-dir*2,ly,0.5);
      movePlayer(d,lx+dir*2,ly+ri(-5,5),0.5);
      hot(r);hot(d);
      await ballTo(lx,ly,0.55);                      // ロブが落ちる
      await maybeVs(r,A,d,D,"🚀 DFラインの裏の駆けっこ(速)");
      const aSc=eff(r,"spd",min,A,D)*(fx(r).duelSpd||1)*A.teamChance*tfA*rr();
      const dSc=(eff(d,"spd",min,D,A)*0.55+eff(d,"def",min,D,A)*0.45)*(fx(d).duelD||1)*D.teamDef*tfD*rr();
      if(aSc>dSc*TH.longRace){
        r.stat.duelW++;
        movePlayer(r,gx-dir*8,ly+(50-ly)*0.3,0.35);
        await ballTo(gx-dir*9,ly+(50-ly)*0.3,0.3);   // 裏に抜けた
        feed(`<b>${r.c.name}</b>(速${r.c.spd})が${d.c.name}(速${d.c.spd})を出し抜いて裏へ抜けた!GKと1対1!`,"chance");
        if(fx(r).duelSpd)skillFeed(r);
        await tryShot(r,A,D,min,false,null,null,p);
      }else{
        r.stat.duelL++;d.stat.duelW++;
        feed(`${d.c.name}(速${d.c.spd})が先回りしてクリア!`);if(fx(d).duelD)skillFeed(d);
        await ballTo(50,ly+ri(-12,12),0.55);
      }
    }else{
      cut.stat.tkl++;
      feed(`${who}🚀 ロングパスは${cut.c.name}がインターセプト!`);hot(cut);
      await ballTo(curP(cut).x,curP(cut).y,0.4);
    }
  }

  else if(st==="short"){ // 三角パスで崩す
    const mfs=A.players.filter(p=>p.role==="MF");
    const m1=mfs.length?rnd(mfs):pickAttacker(A);
    let m2=mfs.filter(p=>p!==m1);m2=m2.length?rnd(m2):m1;
    const pr=pickPress(D);
    hot(m1);hot(m2);
    await ballTo(curP(m1).x,curP(m1).y,0.3);
    await ballTo(curP(m2).x+dir*3,curP(m2).y,0.3);   // ワンツー
    const chain=((eff(m1,"tec",min,A,D)+eff(m2,"tec",min,A,D))/2)*((fx(m1).mid||1)+(fx(m2).mid||1))/2*tfA*rr();
    const prSc=(eff(pr,"def",min,D,A)*0.5+eff(pr,"spd",min,D,A)*0.5)*tfD*rr();
    if(chain>prSc*TH.chain){
      feed(`${who}🔄 <b>${m1.c.name}</b>→<b>${m2.c.name}</b>(技${m1.c.tec}・${m2.c.tec})、細かいパスワークで崩す!`,"chance");
      await duel(A,D,min,tfA,tfD,who,TH.shortBonus);
    }else{
      pr.stat.tkl++;
      feed(`${who}🔄 ${pr.c.name}がパスカット!ショートパスを読まれている`);hot(pr);
      await ballTo(curP(pr).x,curP(pr).y,0.35);
    }
  }

  else await duel(A,D,min,tfA,tfD,who,1);
}
async function duel(A,D,min,tfA,tfD,who,bonus){
  const atk=pickAttacker(A), df=pickDefender(D);
  const dir=dirOf(A),gx=goalXOf(A);
  const ex=gx-dir*16, ey=30+ri(0,40);   // ペナルティエリア手前で勝負
  movePlayer(atk,ex-dir*3,ey,0.45);
  movePlayer(df,ex+dir*3,ey+ri(-4,4),0.45);
  await ballTo(ex-dir*4,ey,0.45);
  const type=pickW(["spd","pow","tec"],k=>atk.c[k]*atk.c[k]);
  const duelKey="duel"+type[0].toUpperCase()+type.slice(1);
  const dt=DUEL_TYPES[type];
  hot(atk);hot(df);
  await maybeVs(atk,A,df,D,`${dt.icon} ${dt.label}(${STAT_LABEL[type]}${atk.c[type]} vs 守${df.c.def})`);
  const aSc=eff(atk,type,min,A,D)*(fx(atk)[duelKey]||1)*A.teamChance*tfA*bonus*rr();
  const dSc=(eff(df,"def",min,D,A)*0.62+eff(df,type,min,D,A)*0.38)*(fx(df).duelD||1)*D.teamDef*tfD*rr();
  if(aSc>dSc*TH.duel){
    atk.stat.duelW++;
    movePlayer(atk,gx-dir*8,ey+(50-ey)*0.25,0.35);
    await ballTo(gx-dir*9,ey+(50-ey)*0.25,0.3);     // 抜き去る
    feed(`${who}${dt.icon} ${dt.label}! <b>${atk.c.name}</b>(${STAT_LABEL[type]}${atk.c[type]}) vs ${df.c.name}(守${df.c.def})…突破!`,"chance");
    if(fx(atk)[duelKey])skillFeed(atk);
    await tryShot(atk,A,D,min,false);
  }else{
    atk.stat.duelL++;df.stat.duelW++;
    feed(`${who}${dt.icon} ${atk.c.name}の${dt.label} → ${df.c.name}(守${df.c.def})が止めた!`);
    if(fx(df).duelD)skillFeed(df);
    await ballTo(ex+dir*9,ey+ri(-8,8),0.5);          // 奪ってクリア
  }
}

function fieldPos(p){ // フォーメーション定位置(横ピッチ座標)
  if(p.fside==="H")return {x:8+(100-p.y)*0.40, y:10+p.x*0.80};
  return {x:92-(100-p.y)*0.40, y:90-p.x*0.80};
}
const clX=x=>Math.max(3,Math.min(97,x)), clY=y=>Math.max(7,Math.min(93,y));
function toScreen(x,y){ // 内部(攻撃軸x,横y) → 画面(縦ピッチ left,top)
  return {sx:6+y*0.88, sy:97-x*0.94};
}
function setPos(el,x,y,dur){
  const s=toScreen(x,y);
  el.style.transition=`left ${dur}s steps(7,end), top ${dur}s steps(7,end)`;
  el.style.left=s.sx+"%";el.style.top=s.sy+"%";
}
function curP(p){return p.cur||(p.cur=fieldPos(p));}
function movePlayer(p,x,y,dur){
  if(!p.el)return;
  x=clX(x);y=clY(y);p.cur={x,y};setPos(p.el,x,y,dur);
}
async function ballTo(x,y,dur,ease){ // ボールを実際に移動(待ち合わせ可能)
  const fb=document.getElementById("fball");
  x=clX(x);y=clY(y);
  const tm=ease==="linear"?"steps(4,end)":"steps(6,end)";
  const s=toScreen(x,y);
  fb.style.transition=`left ${dur}s ${tm}, top ${dur}s ${tm}`;
  fb.style.left=s.sx+"%";fb.style.top=s.sy+"%";
  if(MC){MC.bx=x;MC.by=y;MC.ball=x;}
  await sleep(dur*1000);
}
const dirOf=T=>T.side==="H"?1:-1;       // 攻める方向
const goalXOf=T=>T.side==="H"?94:6;     // 攻め込む先のゴールx
function buildField(){
  const fv=document.getElementById("fieldview");
  fv.querySelectorAll(".tok").forEach(e=>e.remove());
  const mk=p=>{
    const t=document.createElement("div");t.className="tok";
    const ring=document.createElement("div");ring.className="ring "+p.fside;
    t.appendChild(ring);
    t.appendChild(spriteCanvas(p.c,26));
    fv.appendChild(t);p.el=t;
    p.cur=fieldPos(p);
    setPos(t,p.cur.x,p.cur.y,0);
  };
  MC.home.players.forEach(mk);
  MC.away.players.forEach(mk);
  const fb=document.getElementById("fball");
  const s0=toScreen(50,50);
  fb.style.transition="none";fb.style.left=s0.sx+"%";fb.style.top=s0.sy+"%";
  MC.bx=50;MC.by=50;
}
function laneY(p){return p.fside==="H"?10+p.x*0.80:90-p.x*0.80;}
function updateField(){ // 陣形ブロックがボールに追従して全員が敵陣⇔自陣をスライド
  const M=MC;if(!M)return;
  [...M.home.players,...M.away.players].forEach(p=>{
    if(!p.el)return;
    const ty=typeOf(p.c);
    const ballT=p.fside==="H"?M.bx:100-M.bx;        // チーム座標系のボール位置
    const front=Math.min(90,Math.max(45,ballT+16)); // 最前線
    const back=Math.min(58,Math.max(10,ballT-34));  // 最終ライン
    let xT,y;
    if(p.role==="GK"){
      xT=Math.min(26,Math.max(5,back-6+ty.adv*0.7)); // スイーパーは高め
      y=50+(M.by-50)*0.3;
    }else{
      const depth=Math.min(1,Math.max(0,(91-p.y)/73)); // GK=0..FW=1
      xT=back+depth*(front-back)+ty.adv;
      y=laneY(p)+(laneY(p)<50?-1:1)*(ty.wide||0)*0.6;
      y+=(M.by-y)*0.12;                                // コンパクトネス
    }
    let x=p.fside==="H"?xT:100-xT;
    if(p.role!=="GK"){
      const dx=M.bx-x,dy=M.by-y,dist=Math.hypot(dx,dy);
      if(dist<26){const k=(26-dist)/26*ty.chase;x+=dx*k;y+=dy*k;}
      x+=(Math.random()*2-1)*ty.roam;
      y+=(Math.random()*2-1)*ty.roam*1.3;
    }
    movePlayer(p,x,y,0.7);
  });
  // オフザボールの飛び出し
  const all=[...M.home.players,...M.away.players].filter(p=>p.el&&p.role!=="GK");
  for(let k=0;k<2;k++){
    const p=pickW(all,q=>typeOf(q.c).run||0.2);
    if(!p)continue;
    const dir=p.fside==="H"?1:-1;
    movePlayer(p,curP(p).x+dir*ri(4,9),curP(p).y+ri(-7,7),0.55);
  }
}
async function kickoffReset(){ // ゴール後:全員定位置→センターサークルへ
  if(!MC)return;
  [...MC.home.players,...MC.away.players].forEach(p=>{
    const b=fieldPos(p);movePlayer(p,b.x,b.y,0.8);
  });
  await ballTo(50,50,0.7);
}
function hot(p,ms){
  if(!p||!p.el)return;
  p.el.classList.add("hot");
  setTimeout(()=>p.el&&p.el.classList.remove("hot"),ms||1600);
}

async function tickAsync(){
  const M=MC;
  M.min+=3;
  document.getElementById("clock").textContent=(M.min>=90?"90+":M.min)+"分";
  M.home.tactic=S.tactic;M.home.style=S.style;
  if(M.min===60){
    M.away.tactic=M.away.score<M.home.score?"atk":M.away.score>M.home.score?"def":"bal";
    if(M.away.tactic==="atk")feed(`${M.name}がカードを前に動かしてきた!攻勢だ!`);
  }
  const mh=midPower(M.home,M.away,M.min),ma=midPower(M.away,M.home,M.min);
  let homeAtt=Math.random()<mh/(mh+ma);
  if(!homeAtt&&M.home.style==="long"&&Math.random()<0.22){homeAtt=true;feed("素早い切り替えからロングカウンター!","chance");}
  if(homeAtt&&M.away.style==="long"&&Math.random()<0.22){homeAtt=false;feed("🔴 相手のロングカウンター!","chance");}
  const T=homeAtt?M.home:M.away;
  const dir=dirOf(T);
  // ビルドアップ:保持側の選手へパス
  const c1=pickW(T.players.filter(p=>p.role!=="GK"),p=>p.role==="MF"?2:p.role==="DF"?1:1.4);
  await ballTo(curP(c1).x+dir*2,curP(c1).y,0.4);
  updateField();
  if(Math.random()<0.5){
    await attackEvent(T, homeAtt?M.away:M.home, M.min);
  }else{
    const mates=T.players.filter(p=>p!==c1&&p.role!=="GK");
    const c2=pickW(mates,p=>1+(dir>0?curP(p).x:100-curP(p).x)/50); // 前の選手ほど受けやすい
    await ballTo(curP(c2).x+dir*2,curP(c2).y,0.45);
    if(Math.random()<0.45)feed(["中盤で激しいボールの奪い合い","じっくりとパスを回す","ラインを押し上げていく","セカンドボールを拾った"][ri(0,3)]);
  }
}
async function runLoop(){
  if(!MC||MC.loop)return;
  MC.loop=true;
  while(MC&&!MC.halt&&MC.min<90){
    await tickAsync();
    if(!MC||MC.halt)break;
    await sleep(420);
  }
  if(MC){
    MC.loop=false;
    if(MC.min>=90&&!MC.halt)await endMatch();
  }
}

function startMatch(idx){
  const filled=FORMS[S.form].filter((_,i)=>S.squad[i]!=null).length;
  if(filled<11){toast(`スタメンが${filled}/11人です!編成画面で揃えよう`);
    document.querySelector('[data-s="team"]').click();return;}
  const [name,lv,form]=CLUBS[idx];
  S.tactic="bal";S.style="center";
  document.querySelectorAll(".tactics [data-t]").forEach(b=>b.classList.toggle("on",b.dataset.t==="bal"));
  document.querySelectorAll("#styleRow [data-st]").forEach(b=>b.classList.toggle("on",b.dataset.st==="center"));
  document.getElementById("mAway").textContent=name;
  document.getElementById("sH").textContent=0;document.getElementById("sA").textContent=0;
  document.getElementById("feed").innerHTML="";document.getElementById("matchEnd").innerHTML="";
  hideStatOverlay();
  document.querySelectorAll(".screen").forEach(x=>x.classList.remove("on"));
  document.getElementById("scr-match").classList.add("on");

  const home=myTeam(),away=oppTeam(lv,form);
  away.style=oppPickStyle(away);
  MC={home,away,min:0,ball:50,bx:50,by:50,idx,name,lv,subs:3,halt:false,loop:false};
  document.getElementById("subN").textContent=3;
  buildField();
  feed(`⚽ キックオフ! vs ${name}(Lv.${lv})`);
  feed(`相手のフォーメーション:【${form}】`);
  feed(`相手の戦術:${STYLE_LABEL[away.style]}`);
  const ctr=FORM_COUNTER[form];
  if(ctr)feed(`💡 この陣形には ${STYLE_LABEL[ctr.best]} が有効(+${Math.round((COUNTER_BONUS-1)*100)}%) / ${STYLE_LABEL[ctr.worst]} は通じにくい(−${Math.round((1-COUNTER_PENALTY)*100)}%)`,"chance");
  if(home.chemN>=3)feed(`🤝 ${home.chemNat} ${natName(home.chemNat)}勢${home.chemN}人のケミストリー! チーム能力 +${Math.round((home.chem-1)*100)}%`,"chance");
  const srs=away.players.filter(p=>p.c.rar==="sr"||p.c.rar==="l");
  if(srs.length)feed(`⚠ 要注意:相手の${srs.map(p=>p.c.name+"【"+p.c.skill.name+"】").join("、")}`);
  runLoop();
}

function renderStatRows(team){
  const rows=team.players.map(p=>({p,r:statRating(p)})).sort((a,b)=>b.r-a.r);
  const mom=rows[0];
  let h='<table class="statTbl"><tr><th>枠</th><th>選手</th><th>評価</th><th>G</th><th>A</th><th>デュエル</th><th>SV</th></tr>';
  rows.forEach(({p,r})=>{
    const s=p.stat,isMom=p===mom.p,low=r<5.5;
    h+=`<tr class="${isMom?"mom":""}${low?" lowform":""}">
      <td><span class="pos ${p.role}">${p.subRole||p.role}</span></td>
      <td>${isMom?"★":""}${p.c.name}</td>
      <td>${r.toFixed(1)}</td>
      <td>${s.goals}</td>
      <td>${s.assists}</td>
      <td>${s.duelW}-${s.duelL}</td>
      <td>${p.role==="GK"?s.saves:"-"}</td>
    </tr>`;
  });
  h+='</table><div class="lg" style="margin-top:4px">★MOM(最優秀選手) / 評価が低い選手は次戦の入れ替えを検討しよう</div>';
  return h;
}

async function endMatch(){
  const M=MC,lv=M.lv,sh=M.home.score,sa=M.away.score;
  if(S._leagueMatch){
    S._leagueMatch=false;
    const e=document.getElementById("matchEnd");
    const r=sh>sa?"🏆 勝利":sh===sa?"🤝 引分":"😢 敗北";
    e.innerHTML=`<div class="banner">${r} ${sh}-${sa}</div>`;
    showStatOverlay(M.home,M.away);
    finishLeagueRound(sh,sa);
    const b=document.createElement("button");b.className="btn";b.textContent="順位表へ戻る";
    b.onclick=()=>{MC=null;document.querySelector('[data-s="home"]').click();
      document.querySelector('#modeRow [data-m="league"]').click();};
    e.appendChild(b);
    await save();MC=null;return;
  }
  let msg,reward;
  if(sh>sa){msg="🏆 勝利!!";reward=100+lv*40;if(M.idx===S.cleared)S.cleared++;}
  else if(sh===sa){msg="🤝 引き分け";reward=50;}
  else{msg="😢 敗北…";reward=30;}
  S.coins+=reward;coinUI();
  feed(`試合終了 ${sh}-${sa} ${msg} 報酬🪙${reward}`,"goal");
  const dropP=sh>sa?0.18:sh===sa?0.08:0.04;
  let dropMsg="";
  if(Math.random()<dropP){
    S.legendPacks=(S.legendPacks||0)+1;
    dropMsg=`<div class="banner" style="font-size:15px;color:#7dff9e">🎁 レジェンドパックを手に入れた!!</div>`;
    feed("🎁 レジェンドパックを手に入れた!!ガチャ画面で開封できる","goal");
  }
  const e=document.getElementById("matchEnd");
  e.innerHTML=`<div class="banner">${msg}</div>`+dropMsg;
  showStatOverlay(M.home,M.away);
  const b=document.createElement("button");b.className="btn";b.textContent="リーグに戻る";
  b.onclick=()=>{document.querySelector('[data-s="home"]').click();};
  e.appendChild(b);
  MC=null;
  await save();
}

function fatClass(v){return v<20?"ok":v<40?"mid":"bad";}
function renderSubList(){
  const l=document.getElementById("subList");l.innerHTML="";l.style.display="block";
  document.getElementById("subBench").style.display="none";
  document.getElementById("subTitle").textContent="OUTする選手を選択(試合は一時停止中)";
  MC.home.players.forEach((p,pi)=>{
    const tired=Math.round((1-fatigue(p.c,MC.min-p.enter))*100);
    const d=document.createElement("div");d.className="subrow";
    d.innerHTML=`<span class="pos ${p.role}">${p.subRole||p.role}</span><span class="sp"></span><b>${p.c.name}</b>
      <span style="font-size:10px;color:#8fa3b8">${typeOf(p.c).n}<br>攻${p.c.off} 守${p.c.def} 持${p.c.sta}</span>
      <span class="fat ${fatClass(tired)}">消耗${tired}%</span>`;
    d.querySelector(".sp").appendChild(spriteCanvas(p.c,30));
    d.onclick=()=>renderBench(pi);
    l.appendChild(d);
  });
}
function renderBench(pi){
  const out=MC.home.players[pi];
  const onField=MC.home.players.map(p=>p.c.id);
  const bench=S.coll.filter(c=>!onField.includes(c.id))
    .sort((a,b)=>posFit(b.sub,out.subRole)-posFit(a.sub,out.subRole)||total(b)-total(a));
  if(!bench.length){toast("ベンチに選手がいません!ガチャで増やそう");return;}
  document.getElementById("subTitle").textContent=`INする選手を選択(OUT: ${out.c.name} / 枠は${out.subRole||out.role})`;
  document.getElementById("subList").style.display="none";
  const g=document.getElementById("subBench");g.style.display="flex";g.innerHTML="";
  bench.forEach(c=>{
    const e=cardEl(c,true);
    e.onclick=()=>{
      const np={c,role:out.role,subRole:out.subRole,pen:posFit(c.sub,out.subRole),x:out.x,y:out.y,enter:MC.min,fside:"H",el:out.el,cur:out.cur,
        stat:{shots:0,goals:0,assists:0,duelW:0,duelL:0,tkl:0,saves:0},
        keyStat:out.keyStat||null,keyMul:out.keyMul||1};
      MC.home.players[pi]=np;
      if(np.el){np.el.innerHTML="";
        const rg=document.createElement("div");rg.className="ring H";
        np.el.appendChild(rg);np.el.appendChild(spriteCanvas(c,26));}
      recalcAuras(MC.home);
      MC.subs--;document.getElementById("subN").textContent=MC.subs;
      const fitMark=np.pen>=POSFIT.exact?"":np.pen>POSFIT.group?`⚠${c.sub}→${out.subRole}(細分違い)`:`⚠${c.sub}→${out.subRole}(ポジ違い)`;
      feed(`🔁 交代!OUT:${out.c.name} → IN:<b>${c.name}</b>(${c.sub}${fitMark?" "+fitMark:""})`,"chance");
      closeSub();
    };
    g.appendChild(e);
  });
}
function closeSub(){
  document.getElementById("subModal").classList.remove("on");
  if(MC&&MC.halt){MC.halt=false;runLoop();}
}

  window.__boot&&window.__boot("3/3: 起動完了(セーブ読込は失敗→初期データ)",true);
});
